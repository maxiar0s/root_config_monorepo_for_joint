services:
  db:
    image: mysql:8.0
    container_name: joint-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev_password}
      MYSQL_DATABASE: ${DB_NAME:-joint_local}
      MYSQL_USER: ${DB_USERNAME:-joint_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-joint_pass}
    ports:
      - '3308:3306'
    volumes:
      - mysql_data_dev:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - joint-dev-net

  backend:
    build:
      context: ./joint-backend
      dockerfile: Dockerfile.dev
    container_name: joint-backend-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: local
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-joint_local}
      DB_USERNAME: ${DB_USERNAME:-joint_user}
      DB_PASSWORD: ${DB_PASSWORD:-joint_pass}
      JWT_SECRET: ${JWT_SECRET:-local_dev_jwt_secret_change_me}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '3000:3000'
    volumes:
      - ./joint-backend:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/uploads
    networks:
      - joint-dev-net

  frontend:
    build:
      context: ./joint-frontend
      dockerfile: Dockerfile.dev
    container_name: joint-frontend-dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      NG_CLI_ANALYTICS: 'false'
    command: npm run start -- --host 0.0.0.0 --port 4200 --poll 2000
    ports:
      - '4200:4200'
    volumes:
      - ./joint-frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - joint-dev-net

volumes:
  mysql_data_dev:
  backend_node_modules:
  frontend_node_modules:
  backend_uploads:

networks:
  joint-dev-net:
    driver: bridge
